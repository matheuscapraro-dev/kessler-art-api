services:
  postgres:
    image: postgres:17
    container_name: kessler-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: kessler_dev
      POSTGRES_PASSWORD: kessler_dev_123
      POSTGRES_DB: kessler_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
